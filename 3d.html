<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>JEANS·INK — 3D Preview (beta)</title>
  <meta name="theme-color" content="#0D0D0D">
  <link rel="stylesheet" href="css/style.css?v=17">
  <!-- Google <model-viewer> — no build step, just a web component -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <style>
    .v3d-wrap { padding: 40px 0 80px; }
    .v3d-head { text-align:center; margin-bottom: 28px; }
    .v3d-head .badge { display:inline-block; }
    .v3d-stage {
      position: relative;
      max-width: 720px; margin: 0 auto;
      border: 1px solid var(--border);
      border-radius: 20px; overflow: hidden;
      background: #f5f5f5;
    }
    model-viewer {
      width: 100%; height: 70vh; max-height: 620px;
      --poster-color: transparent;
      background: #f5f5f5;
    }
    .v3d-controls {
      display:flex; flex-wrap:wrap; gap:10px; justify-content:center;
      margin-top: 22px;
    }
    .swatch {
      width: 38px; height: 38px; border-radius: 999px;
      border: 2px solid var(--border-2); cursor: pointer;
      transition: transform .15s ease, border-color .15s ease;
    }
    .swatch:hover { transform: scale(1.12); }
    .swatch.active { border-color: var(--accent); transform: scale(1.12); }
    .v3d-note {
      max-width: 620px; margin: 28px auto 0; padding: 16px 20px;
      border: 1px dashed var(--border-2); border-radius: 14px;
      color: var(--text-muted); font-size: .85rem; line-height: 1.7;
      font-family: 'Montserrat', sans-serif;
    }
    .v3d-note b { color: var(--accent); }
    .v3d-hint { text-align:center; color: var(--text-muted); font-size:.8rem; margin-top:14px; letter-spacing:.04em; }
    .v3d-label { text-align:center; font-family:'Montserrat',sans-serif; font-size:.72rem;
      letter-spacing:.18em; text-transform:uppercase; color:var(--text-muted); margin:30px 0 12px; }
    .v3d-types { display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }
    .v3d-type {
      font-family:'Montserrat',sans-serif; font-weight:700; font-size:.82rem;
      padding:14px 22px 12px; border-radius:16px; cursor:pointer; letter-spacing:.06em;
      background:rgba(255,255,255,.04); color:var(--text); border:1px solid var(--border-2);
      transition: all .18s ease; display:flex; flex-direction:column; align-items:center; gap:8px;
      min-width:110px;
    }
    .v3d-type:hover { border-color:var(--accent); background:rgba(197,242,48,.06); }
    .v3d-type.active { background:rgba(197,242,48,.13); color:var(--accent); border-color:var(--accent); }
    .v3d-type svg { opacity:.7; transition: opacity .18s; }
    .v3d-type.active svg { opacity:1; }
    .v3d-type.active svg path { fill: var(--accent); }
  </style>
</head>
<body class="theme-dark">

<!-- ── NAV ── -->
<nav class="nav">
  <div class="container nav-inner">
    <a href="index.html" class="nav-logo mono"><img src="assets/logo-nav.png" alt="JEANS·INK" style="margin-right:9px">JEANS<span>·</span>INK</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="catalog.html">Catalog</a></li>
      <li><a href="mockup.html">Try On</a></li>
      <li><a href="how-it-works.html">Process</a></li>
      <li><a href="track.html">Track</a></li>
      <li><a href="order.html" class="nav-cta">Order Now</a></li>
    </ul>
    <button class="nav-burger" id="navBurger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<main class="v3d-wrap">
  <div class="container">
    <div class="v3d-head">
      <span class="badge badge-live mono">3D Preview — Beta</span>
      <h1 style="margin-top:16px">Spin it. <em>See it.</em></h1>
      <p class="muted" style="font-family:'Montserrat',sans-serif;max-width:520px;margin:12px auto 0">
        Загвараа 360°-аар эргүүлж, томруулж үзээрэй. Доорх өнгөнүүдээр denim өнгийг солино.
      </p>
    </div>

    <div class="v3d-stage">
      <model-viewer
        id="viewer"
        src="assets/models/jeans-skinny.glb?v=1"
        poster=""
        alt="JEANS·INK 3D preview"
        camera-controls
        touch-action="pan-y"
        auto-rotate
        auto-rotate-delay="0"
        rotation-per-second="18deg"
        shadow-intensity="1"
        exposure="1.1"
        environment-image="neutral"
        skybox-color="#f5f5f5"
        camera-orbit="0deg 78deg 88%"
        camera-target="0m 0.18m 0m"
        min-camera-orbit="auto auto 60%"
        max-camera-orbit="auto auto 140%"
        interaction-prompt="none">
      </model-viewer>
    </div>

    <!-- Step 1: pants fit -->
    <p class="v3d-label">1 · Загвар сонгох</p>
    <div class="v3d-types" id="types">
      <button class="v3d-type active" data-type="skinny" data-src="assets/models/jeans-skinny.glb?v=1">
        <!-- Skinny silhouette -->
        <svg width="36" height="54" viewBox="0 0 36 54" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 0 L28 0 L30 2 L26 26 L28 54 L20 54 L18 32 L16 54 L8 54 L10 26 L6 2 Z" fill="#aaa"/>
          <rect x="6" y="2" width="24" height="4" rx="2" fill="#888"/>
        </svg>
        SKINNY
      </button>
      <button class="v3d-type" data-type="wide" data-src="assets/models/jeans-wide.glb?v=1">
        <!-- Wide silhouette -->
        <svg width="50" height="54" viewBox="0 0 50 54" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 0 L44 0 L46 2 L38 26 L44 54 L30 54 L25 34 L20 54 L6 54 L12 26 L4 2 Z" fill="#aaa"/>
          <rect x="4" y="2" width="42" height="4" rx="2" fill="#888"/>
        </svg>
        WIDE
      </button>
    </div>

    <!-- Step 2: colour -->
    <p class="v3d-label">2 · Өнгө сонгох</p>
    <div class="v3d-controls" id="swatches">
      <span class="swatch" data-color="#f0f0f0" style="background:#f0f0f0;border-color:#ccc" title="White"></span>
      <span class="swatch" data-color="#888888" style="background:#888888" title="Gray"></span>
      <span class="swatch active" data-color="#1a1a1a" style="background:#1a1a1a" title="Black"></span>
      <span class="swatch" data-color="#a8c4d4" style="background:#a8c4d4" title="Light Blue"></span>
      <span class="swatch" data-color="#2e5f8a" style="background:#2e5f8a" title="Blue"></span>
    </div>
    <p class="v3d-hint">Drag = эргүүлэх · Scroll/pinch = томруулах</p>

    <!-- Step 3: continue -->
    <div style="text-align:center;margin-top:34px">
      <a href="catalog.html" class="btn btn-primary" id="v3dNext">
        Наалт сонгох
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </a>
    </div>
  </div>
</main>

<script>
  const viewer = document.getElementById('viewer');
  const swatches = document.getElementById('swatches');
  const types = document.getElementById('types');
  let currentType = 'skinny';
  let currentColor = '#1a1a1a';

  // Re-apply the chosen colour every time a model finishes loading
  viewer.addEventListener('load', () => applyColor(currentColor));

  // Type select — loads the model lazily (only when that type is picked)
  types.addEventListener('click', (e) => {
    const t = e.target.closest('.v3d-type');
    if (!t || t.classList.contains('active')) return;
    [...types.children].forEach(b => b.classList.remove('active'));
    t.classList.add('active');
    currentType = t.dataset.type;
    viewer.dataset.fellBack = '';
    viewer.src = t.dataset.src;   // fetched now, not at page load
    saveChoice();
  });

  // Colour swap via the scene-graph material API
  swatches.addEventListener('click', (e) => {
    const sw = e.target.closest('.swatch');
    if (!sw) return;
    [...swatches.children].forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
    currentColor = sw.dataset.color;
    applyColor(currentColor);
    saveChoice();
  });

  function applyColor(hex) {
    const c = hexToRgb(hex);
    const mats = viewer.model && viewer.model.materials;
    if (mats && mats.length) {
      mats.forEach(m => {
        try { m.pbrMetallicRoughness.setBaseColorFactor([c.r, c.g, c.b, 1]); } catch (_) {}
      });
    }
  }

  // Fallback if a model fails to load
  viewer.addEventListener('error', () => {
    if (viewer.dataset.fellBack) return;
    viewer.dataset.fellBack = '1';
    console.warn('3D model load error, type:', currentType);
  });

  // Persist the choice so the next step (catalog/order) can read it
  function saveChoice() {
    try { localStorage.setItem('ji_fit', JSON.stringify({ type: currentType, color: currentColor })); } catch (_) {}
  }

  function hexToRgb(hex) {
    const n = parseInt(hex.slice(1), 16);
    return { r: ((n >> 16) & 255) / 255, g: ((n >> 8) & 255) / 255, b: (n & 255) / 255 };
  }
</script>
<script src="js/main.js?v=5"></script>
</body>
</html>
